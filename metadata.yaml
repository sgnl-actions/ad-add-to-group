# yaml-language-server: $schema=https://raw.githubusercontent.com/sgnl-actions/schemas/main/metadata.schema.json
name: ad-add-to-group
description: Add a user to a group in on-premise Active Directory via LDAP

# Input parameters for web form generation
inputs:
  baseDN:
    type: text
    description: Base DN to search for the user (e.g., DC=corp,DC=example,DC=com)
    required: true
    validation:
      min: 1
      max: 500

  samAccountName:
    type: text
    description: The user's sAMAccountName (pre-Windows 2000 logon name) to lookup
    required: true
    validation:
      min: 1
      max: 256

  groupDN:
    type: text
    description: Distinguished Name of the target group (e.g., CN=Admins,OU=Groups,DC=corp,DC=example,DC=com)
    required: true
    validation:
      min: 1
      max: 500

  address:
    type: text
    description: Optional LDAP server URL override (e.g., ldaps://ad.corp.example.com:636)
    required: false
    validation:
      min: 1
      max: 200

  dry_run:
    type: boolean
    description: When true, validates parameters and logs intended actions without making changes to Active Directory
    required: false

# Expected output structure
outputs:
  status:
    type: text
    description: Operation result (success, dry_run_completed, halted)

  userDN:
    type: text
    description: The resolved Distinguished Name of the user

  groupDN:
    type: text
    description: Distinguished Name of the group that was processed

  added:
    type: boolean
    description: Whether the user was newly added to the group

  address:
    type: text
    description: The LDAP server URL that was used

  message:
    type: text
    description: Additional status message or error details
