# yaml-language-server: $schema=https://raw.githubusercontent.com/sgnl-actions/schemas/main/metadata.schema.json
name: ad-add-to-group
description: Add a user or group to a group in on-premise Active Directory via LDAP, optionally with a TTL for temporary membership

# Input parameters for web form generation
inputs:
  baseDN:
    type: text
    description: Base DN to search for the member (e.g., DC=corp,DC=example,DC=com)
    required: true
    validation:
      min: 1
      max: 500

  samAccountName:
    type: text
    description: The sAMAccountName of the user or group to add (sAMAccountName is unique per domain and resolves to either a user or a group)
    required: true
    validation:
      min: 1
      max: 256

  groupDN:
    type: text
    description: Distinguished Name of the target group (e.g., CN=Admins,OU=Groups,DC=corp,DC=example,DC=com)
    required: true
    validation:
      min: 1
      max: 500

  address:
    type: text
    description: Optional LDAP server URL override (e.g., ldaps://ad.corp.example.com:636)
    required: false
    validation:
      min: 1
      max: 200

  ttlSeconds:
    type: number
    description: Optional time-to-live in seconds for temporary group membership. When set, AD automatically removes the membership after the TTL elapses. Requires Forest Functional Level Windows Server 2016+ and the "Privileged Access Management Feature" to be enabled. Fails if the member is already in the group.
    required: false
    validation:
      min: 1

  dry_run:
    type: boolean
    description: When true, validates parameters and logs intended actions without making changes to Active Directory
    required: false

# Expected output structure
outputs:
  status:
    type: text
    description: Operation result (success, dry_run_completed, halted)

  memberDN:
    type: text
    description: The resolved Distinguished Name of the member (user or group) that was added

  userDN:
    type: text
    description: Backward-compatible alias for memberDN (same value)

  groupDN:
    type: text
    description: Distinguished Name of the group that was processed

  added:
    type: boolean
    description: Whether the member was newly added to the group

  ttlSeconds:
    type: number
    description: Echoed back when a TTL was requested on the membership

  address:
    type: text
    description: The LDAP server URL that was used

  baseDN:
    type: text
    description: The base DN used to search for the member

  samAccountName:
    type: text
    description: The sAMAccountName used to identify the member

  message:
    type: text
    description: Additional status message or error details

environment:
  ADDRESS:
    type: text
    description: LDAP server URL
    required: false
  TLS_SKIP_VERIFY:
    type: text
    description: Skip TLS certificate verification (set to 'true' to disable)
    required: false

secrets:
  BASIC_USERNAME:
    type: text
    description: LDAP bind username (Distinguished Name)
    required: true
  BASIC_PASSWORD:
    type: text
    description: LDAP bind password
    required: true
