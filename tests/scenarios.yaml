action:
  params:
    baseDN: DC=corp,DC=example,DC=com
    samAccountName: jdoe
    groupDN: CN=Test Group,OU=Groups,DC=corp,DC=example,DC=com
  context:
    secrets:
      BASIC_USERNAME: CN=svc-sgnl,OU=Service Accounts,DC=corp,DC=example,DC=com
      BASIC_PASSWORD: test-password
    environment:
      ADDRESS: ldaps://ad.corp.example.com:636

scenarios:
  - name: successfully add user to group
    params:
      baseDN: DC=corp,DC=example,DC=com
      samAccountName: jdoe
      groupDN: CN=Test Group,OU=Groups,DC=corp,DC=example,DC=com
    steps:
      - ldap:
          operation: bind
          bindDN: CN=svc-sgnl,OU=Service Accounts,DC=corp,DC=example,DC=com
          password: "[MASKED]"
        fixture: fixtures/200-bind-success.ldap
      - ldap:
          operation: search
          baseDN: DC=corp,DC=example,DC=com
          scope: sub
          filter: "(&(|(objectClass=user)(objectClass=group))(sAMAccountName=jdoe))"
          attributes: ["distinguishedName"]
        fixture: fixtures/200-user-found.ldap
      - ldap:
          operation: modify
          dn: CN=Test Group,OU=Groups,DC=corp,DC=example,DC=com
          changes:
            - operation: add
              modification:
                type: member
                values: ["CN=testuser,OU=Users,OU=adaptertest,DC=adaptertest,DC=sgnl,DC=ai"]
        fixture: fixtures/200-modify-success.ldap
      - ldap:
          operation: unbind
        fixture: fixtures/200-unbind-success.ldap
    invoke:
      returns:
        status: success
        memberDN: CN=testuser,OU=Users,OU=adaptertest,DC=adaptertest,DC=sgnl,DC=ai
        userDN: CN=testuser,OU=Users,OU=adaptertest,DC=adaptertest,DC=sgnl,DC=ai
        groupDN: CN=Test Group,OU=Groups,DC=corp,DC=example,DC=com
        added: true
        address: ldaps://ad.corp.example.com:636

  - name: successfully add group to group
    params:
      baseDN: DC=corp,DC=example,DC=com
      samAccountName: ChildGroup
      groupDN: CN=Parent Group,OU=Groups,DC=corp,DC=example,DC=com
    steps:
      - ldap:
          operation: bind
          bindDN: CN=svc-sgnl,OU=Service Accounts,DC=corp,DC=example,DC=com
          password: "[MASKED]"
        fixture: fixtures/200-bind-success.ldap
      - ldap:
          operation: search
          baseDN: DC=corp,DC=example,DC=com
          scope: sub
          filter: "(&(|(objectClass=user)(objectClass=group))(sAMAccountName=ChildGroup))"
          attributes: ["distinguishedName"]
        fixture: fixtures/200-user-found.ldap
      - ldap:
          operation: modify
          dn: CN=Parent Group,OU=Groups,DC=corp,DC=example,DC=com
          changes:
            - operation: add
              modification:
                type: member
                values: ["CN=testuser,OU=Users,OU=adaptertest,DC=adaptertest,DC=sgnl,DC=ai"]
        fixture: fixtures/200-modify-success.ldap
      - ldap:
          operation: unbind
        fixture: fixtures/200-unbind-success.ldap
    invoke:
      returns:
        status: success
        memberDN: CN=testuser,OU=Users,OU=adaptertest,DC=adaptertest,DC=sgnl,DC=ai
        userDN: CN=testuser,OU=Users,OU=adaptertest,DC=adaptertest,DC=sgnl,DC=ai
        groupDN: CN=Parent Group,OU=Groups,DC=corp,DC=example,DC=com
        added: true
        address: ldaps://ad.corp.example.com:636

  - name: successfully add member with TTL
    params:
      baseDN: DC=corp,DC=example,DC=com
      samAccountName: jdoe
      groupDN: CN=Test Group,OU=Groups,DC=corp,DC=example,DC=com
      ttlSeconds: 3600
    steps:
      - ldap:
          operation: bind
          bindDN: CN=svc-sgnl,OU=Service Accounts,DC=corp,DC=example,DC=com
          password: "[MASKED]"
        fixture: fixtures/200-bind-success.ldap
      - ldap:
          operation: search
          baseDN: DC=corp,DC=example,DC=com
          scope: sub
          filter: "(&(|(objectClass=user)(objectClass=group))(sAMAccountName=jdoe))"
          attributes: ["distinguishedName"]
        fixture: fixtures/200-user-found.ldap
      - ldap:
          operation: modify
          dn: CN=Test Group,OU=Groups,DC=corp,DC=example,DC=com
          changes:
            - operation: add
              modification:
                type: member
                values: ["<TTL=3600>,CN=testuser,OU=Users,OU=adaptertest,DC=adaptertest,DC=sgnl,DC=ai"]
        fixture: fixtures/200-modify-success.ldap
      - ldap:
          operation: unbind
        fixture: fixtures/200-unbind-success.ldap
    invoke:
      returns:
        status: success
        memberDN: CN=testuser,OU=Users,OU=adaptertest,DC=adaptertest,DC=sgnl,DC=ai
        userDN: CN=testuser,OU=Users,OU=adaptertest,DC=adaptertest,DC=sgnl,DC=ai
        groupDN: CN=Test Group,OU=Groups,DC=corp,DC=example,DC=com
        added: true
        ttlSeconds: 3600
        address: ldaps://ad.corp.example.com:636

  - name: TTL add fails when member already exists
    params:
      baseDN: DC=corp,DC=example,DC=com
      samAccountName: jdoe
      groupDN: CN=Test Group,OU=Groups,DC=corp,DC=example,DC=com
      ttlSeconds: 3600
    steps:
      - ldap:
          operation: bind
          bindDN: CN=svc-sgnl,OU=Service Accounts,DC=corp,DC=example,DC=com
          password: "[MASKED]"
        fixture: fixtures/200-bind-success.ldap
      - ldap:
          operation: search
          baseDN: DC=corp,DC=example,DC=com
          scope: sub
          filter: "(&(|(objectClass=user)(objectClass=group))(sAMAccountName=jdoe))"
          attributes: ["distinguishedName"]
        fixture: fixtures/200-user-found.ldap
      - ldap:
          operation: modify
          dn: CN=Test Group,OU=Groups,DC=corp,DC=example,DC=com
          changes:
            - operation: add
              modification:
                type: member
                values: ["<TTL=3600>,CN=testuser,OU=Users,OU=adaptertest,DC=adaptertest,DC=sgnl,DC=ai"]
        fixture: fixtures/68-already-member.ldap
      - ldap:
          operation: unbind
        fixture: fixtures/200-unbind-success.ldap
    invoke:
      throws: "TTL cannot be applied to an existing membership"

  - name: invalid ttlSeconds rejected before LDAP I/O
    params:
      baseDN: DC=corp,DC=example,DC=com
      samAccountName: jdoe
      groupDN: CN=Test Group,OU=Groups,DC=corp,DC=example,DC=com
      ttlSeconds: 0
    steps: []
    invoke:
      throws: "ttlSeconds must be a positive integer"

  - name: member already in group (idempotent, no TTL)
    params:
      baseDN: DC=corp,DC=example,DC=com
      samAccountName: jdoe
      groupDN: CN=Test Group,OU=Groups,DC=corp,DC=example,DC=com
    steps:
      - ldap:
          operation: bind
          bindDN: CN=svc-sgnl,OU=Service Accounts,DC=corp,DC=example,DC=com
          password: "[MASKED]"
        fixture: fixtures/200-bind-success.ldap
      - ldap:
          operation: search
          baseDN: DC=corp,DC=example,DC=com
          scope: sub
          filter: "(&(|(objectClass=user)(objectClass=group))(sAMAccountName=jdoe))"
          attributes: ["distinguishedName"]
        fixture: fixtures/200-user-found.ldap
      - ldap:
          operation: modify
          dn: CN=Test Group,OU=Groups,DC=corp,DC=example,DC=com
          changes:
            - operation: add
              modification:
                type: member
                values: ["CN=testuser,OU=Users,OU=adaptertest,DC=adaptertest,DC=sgnl,DC=ai"]
        fixture: fixtures/68-already-member.ldap
      - ldap:
          operation: unbind
        fixture: fixtures/200-unbind-success.ldap
    invoke:
      returns:
        status: success
        memberDN: CN=testuser,OU=Users,OU=adaptertest,DC=adaptertest,DC=sgnl,DC=ai
        userDN: CN=testuser,OU=Users,OU=adaptertest,DC=adaptertest,DC=sgnl,DC=ai
        groupDN: CN=Test Group,OU=Groups,DC=corp,DC=example,DC=com
        added: false
        message: Member is already a member of the group
        address: ldaps://ad.corp.example.com:636

  - name: member not found
    params:
      baseDN: DC=corp,DC=example,DC=com
      samAccountName: nonexistent
      groupDN: CN=Test Group,OU=Groups,DC=corp,DC=example,DC=com
    steps:
      - ldap:
          operation: bind
          bindDN: CN=svc-sgnl,OU=Service Accounts,DC=corp,DC=example,DC=com
          password: "[MASKED]"
        fixture: fixtures/200-bind-success.ldap
      - ldap:
          operation: search
          baseDN: DC=corp,DC=example,DC=com
          scope: sub
          filter: "(&(|(objectClass=user)(objectClass=group))(sAMAccountName=nonexistent))"
          attributes: ["distinguishedName"]
        fixture: fixtures/200-user-not-found.ldap
      - ldap:
          operation: unbind
        fixture: fixtures/200-unbind-success.ldap
    invoke:
      throws: "Member not found with sAMAccountName: nonexistent"

  - name: authentication failed
    params:
      baseDN: DC=corp,DC=example,DC=com
      samAccountName: jdoe
      groupDN: CN=Test Group,OU=Groups,DC=corp,DC=example,DC=com
    steps:
      - ldap:
          operation: bind
          bindDN: CN=svc-sgnl,OU=Service Accounts,DC=corp,DC=example,DC=com
          password: "[MASKED]"
        fixture: fixtures/49-invalid-credentials.ldap
      - ldap:
          operation: unbind
        fixture: fixtures/200-unbind-success.ldap
    invoke:
      throws: "INVALID_CREDENTIALS"

  - name: dry run mode
    params:
      baseDN: DC=corp,DC=example,DC=com
      samAccountName: jdoe
      groupDN: CN=Test Group,OU=Groups,DC=corp,DC=example,DC=com
      dry_run: true
    steps: []  # No LDAP operations in dry run
    invoke:
      returns:
        status: dry_run_completed
        baseDN: DC=corp,DC=example,DC=com
        samAccountName: jdoe
        memberDN: null
        userDN: null
        groupDN: CN=Test Group,OU=Groups,DC=corp,DC=example,DC=com
        added: false

  - name: missing required parameters
    params:
      baseDN: ""
      samAccountName: jdoe
      groupDN: CN=Test Group,OU=Groups,DC=corp,DC=example,DC=com
    steps: []  # No LDAP operations due to validation failure
    invoke:
      throws: "baseDN is required"

  - name: group not found
    params:
      baseDN: DC=corp,DC=example,DC=com
      samAccountName: jdoe
      groupDN: CN=Nonexistent Group,OU=Groups,DC=corp,DC=example,DC=com
    steps:
      - ldap:
          operation: bind
          bindDN: CN=svc-sgnl,OU=Service Accounts,DC=corp,DC=example,DC=com
          password: "[MASKED]"
        fixture: fixtures/200-bind-success.ldap
      - ldap:
          operation: search
          baseDN: DC=corp,DC=example,DC=com
          scope: sub
          filter: "(&(|(objectClass=user)(objectClass=group))(sAMAccountName=jdoe))"
          attributes: ["distinguishedName"]
        fixture: fixtures/200-user-found.ldap
      - ldap:
          operation: modify
          dn: CN=Nonexistent Group,OU=Groups,DC=corp,DC=example,DC=com
          changes:
            - operation: add
              modification:
                type: member
                values: ["CN=John Doe,OU=Users,DC=corp,DC=example,DC=com"]
        fixture: fixtures/32-no-such-object.ldap
      - ldap:
          operation: unbind
        fixture: fixtures/200-unbind-success.ldap
    invoke:
      throws: "NO_SUCH_OBJECT"

  - name: insufficient permissions
    params:
      baseDN: DC=corp,DC=example,DC=com
      samAccountName: jdoe
      groupDN: CN=Protected Group,OU=Groups,DC=corp,DC=example,DC=com
    steps:
      - ldap:
          operation: bind
          bindDN: CN=svc-sgnl,OU=Service Accounts,DC=corp,DC=example,DC=com
          password: "[MASKED]"
        fixture: fixtures/200-bind-success.ldap
      - ldap:
          operation: search
          baseDN: DC=corp,DC=example,DC=com
          scope: sub
          filter: "(&(|(objectClass=user)(objectClass=group))(sAMAccountName=jdoe))"
          attributes: ["distinguishedName"]
        fixture: fixtures/200-user-found.ldap
      - ldap:
          operation: modify
          dn: CN=Protected Group,OU=Groups,DC=corp,DC=example,DC=com
          changes:
            - operation: add
              modification:
                type: member
                values: ["CN=John Doe,OU=Users,DC=corp,DC=example,DC=com"]
        fixture: fixtures/50-insufficient-access.ldap
      - ldap:
          operation: unbind
        fixture: fixtures/200-unbind-success.ldap
    invoke:
      throws: "INSUFFICIENT_ACCESS_RIGHTS"
